name: CI

on:
  push:
    branches: [v2]
  pull_request:
    branches: [v2]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      # Optional lint step (only if you add ESLint later)
      # - name: Lint
      #   run: npm run lint
